<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整合計算器-純淨排序版</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f9; padding: 10px; color: #333; }
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #e63946; color: white; padding: 15px; text-align: center; }
        .tabs { display: flex; background: #eee; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .tab { flex: 0 0 auto; padding: 12px 20px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; color: #666; }
        .tab.active { background: white; color: #e63946; border-bottom: 3px solid #e63946; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        input[type="number"] { width: 65px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 1.1em; }
        button { width: 100%; padding: 15px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 10px; border-left: 5px solid #e63946; display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #fcdada; padding-bottom: 5px; }
        h3 { margin-top: 0; color: #e63946; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>🛒 鮮肉亭採購計算</h2></div>
    
    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'menu1')">歸樸火鍋</div>
        <div class="tab" onclick="openTab(event, 'menu2')">歸樸烤肉</div>
        <div class="tab" onclick="openTab(event, 'menuA')">北埔烤肉</div>
        <div class="tab" onclick="openTab(event, 'menuB')">北埔火鍋</div>
        <div class="tab" onclick="openTab(event, 'menuC')">自定義 C</div>
    </div>

    <div id="menu1" class="content active">
        <div class="item-row"><span>2人全豬</span><input type="number" id="m1_1" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人牛豬</span><input type="number" id="m1_2" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人全豬</span><input type="number" id="m1_3" placeholder="數量" min="0"></div>
        <button onclick="calculateM1()">計算火鍋食材</button>
        <div id="res1" class="result-box"><h3>📋 應準備清單：</h3><div id="list1"></div></div>
    </div>

    <div id="menu2" class="content">
        <div class="item-row"><span>2人全豬</span><input type="number" id="m2_1" placeholder="數量" min="0"></div>
        <div class="item-row"><span>2人牛豬</span><input type="number" id="m2_2" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人全豬</span><input type="number" id="m2_3" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人牛豬</span><input type="number" id="m2_4" placeholder="數量" min="0"></div>
        <button onclick="calculateM2()">計算烤肉食材</button>
        <div id="res2" class="result-box"><h3>📋 應準備清單：</h3><div id="list2"></div></div>
    </div>

    <div id="menuA" class="content">
        <div class="item-row"><span>2人烤肉</span><input type="number" id="mA_1" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人烤肉</span><input type="number" id="mA_2" placeholder="數量" min="0"></div>
        <div class="item-row"><span>6人烤肉</span><input type="number" id="mA_3" placeholder="數量" min="0"></div>
        <div class="item-row"><span>10人烤肉</span><input type="number" id="mA_4" placeholder="數量" min="0"></div>
        <button onclick="calculateMA()">計算北埔烤肉</button>
        <div id="resA" class="result-box"><h3>📋 應準備清單：</h3><div id="listA"></div></div>
    </div>

    <div id="menuB" class="content">
        <div class="item-row"><span>2人火鍋</span><input type="number" id="mB_1" placeholder="數量" min="0"></div>
        <div class="item-row"><span>4人火鍋</span><input type="number" id="mB_2" placeholder="數量" min="0"></div>
        <div class="item-row"><span>6人火鍋</span><input type="number" id="mB_3" placeholder="數量" min="0"></div>
        <div class="item-row"><span>10人火鍋</span><input type="number" id="mB_4" placeholder="數量" min="0"></div>
        <button onclick="calculateMB()">計算北埔火鍋</button>
        <div id="resB" class="result-box"><h3>📋 應準備清單：</h3><div id="listB"></div></div>
    </div>

    <div id="menuC" class="content">
        <div class="item-row"><span>節慶活動組 01</span><input type="number" id="mC_1" placeholder="數量" min="0"></div>
        <button onclick="calculateMC()">計算自定義 C</button>
        <div id="resC" class="result-box"><div id="listC"></div></div>
    </div>
</div>

<script>
function openTab(evt, tabName) {
    var contents = document.getElementsByClassName("content");
    for (var i = 0; i < contents.length; i++) contents[i].className = contents[i].className.replace(" active", "");
    var tabs = document.getElementsByClassName("tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].className = tabs[i].className.replace(" active", "");
    document.getElementById(tabName).className += " active";
    evt.currentTarget.className += " active";
}

function showResult(resId, listId, s, order) {
    const list = document.getElementById(listId);
    list.innerHTML = "";
    let hasData = false;
    for (const name of order) {
        const qty = s[name];
        if (qty > 0) {
            const unit = name.includes("竹籤") ? "支" : "包/份";
            list.innerHTML += `<div class="res-item"><span>${name}</span> <b>${qty} ${unit}</b></div>`;
            hasData = true;
        }
    }
    document.getElementById(resId).style.display = hasData ? 'block' : 'none';
    if(!hasData) alert("請輸入數量！");
}

function calculateM1() {
    const v1 = parseInt(document.getElementById('m1_1').value) || 0;
    const v2 = parseInt(document.getElementById('m1_2').value) || 0;
    const v3 = parseInt(document.getElementById('m1_3').value) || 0;
    const s = {};
    const add = (n, q) => s[n] = (s[n] || 0) + q;
    const order = ["和牛100克", "牛五花卷片400克", "豬五花卷片400克", "豬嫩肩捲片300克", "豬嫩肩捲片400克", "松阪豬300克", "日式腿丁500克", "火鍋料", "鮭魚火鍋片150克", "海鮮盤", "烏龍麵", "花枝漿", "明蝦", "沙茶醬"];
    
    if(v1 > 0) { add("豬嫩肩捲片300克", v1); add("日式腿丁500克", v1); add("火鍋料", v1); add("鮭魚火鍋片150克", v1); add("海鮮盤", v1); add("烏龍麵", v1); add("沙茶醬", v1); }
    if(v2 > 0) { add("和牛100克", v2); add("牛五花卷片400克", v2); add("豬嫩肩捲片400克", v2); add("日式腿丁500克", v2); add("火鍋料", v2); add("鮭魚火鍋片150克", v2); add("海鮮盤", v2); add("烏龍麵", v2 * 2); add("花枝漿", v2); add("明蝦", v2); add("沙茶醬", v2); }
    if(v3 > 0) { add("豬五花卷片400克", v3); add("豬嫩肩捲片400克", v3); add("松阪豬300克", v3); add("日式腿丁500克", v3); add("火鍋料", v3); add("鮭魚火鍋片150克", v3); add("海鮮盤", v3); add("烏龍麵", v3 * 2); add("花枝漿", v3); add("明蝦", v3); add("沙茶醬", v3); }
    
    showResult('res1', 'list1', s, order);
}

function calculateM2() {
    const v1 = parseInt(document.getElementById('m2_1').value) || 0;
    const v2 = parseInt(document.getElementById('m2_2').value) || 0;
    const v3 = parseInt(document.getElementById('m2_3').value) || 0;
    const v4 = parseInt(document.getElementById('m2_4').value) || 0;
    const s = {};
    const add = (n, q) => s[n] = (s[n] || 0) + q;

    const order = [
        "豬嫩肩300g", "豬嫩肩500g", "美國板腱+豬嫩肩300g", "美國板腱400g", 
        "豬五花500g", "松阪豬150g", "松阪豬150g+牛肋條150g", "松阪豬300g", "依比例豬肋條100g", 
        "依比例豬肋條200g", "牛肋條150g", "牛肋條250g", "普羅旺斯雞腿500g", 
        "海鮮盤", "明蝦", "吐司", "竹籤", "烤肉醬/胡椒粉", 
        "小黑盤/小真空袋", "大黑盤/大真空袋"
    ];

    if(v1 > 0) { add("豬嫩肩300g", v1); add("松阪豬150g", v1); add("依比例豬肋條100g", v1); add("普羅旺斯雞腿500g", v1); add("海鮮盤", v1); add("吐司", v1); add("竹籤", v1 * 2); add("烤肉醬/胡椒粉", v1); add("小黑盤/小真空袋", v1); }
    if(v2 > 0) { add("美國板腱+豬嫩肩300g", v2); add("松阪豬150g+牛肋條150g", v2); add("普羅旺斯雞腿500g", v2); add("海鮮盤", v2); add("吐司", v2); add("竹籤", v2 * 2); add("烤肉醬/胡椒粉", v2); add("小黑盤/小真空袋", v2); }
    if(v3 > 0) { add("豬嫩肩500g", v3); add("豬五花500g", v3); add("松阪豬300g", v3); add("依比例豬肋條200g", v3); add("普羅旺斯雞腿500g", v3); add("海鮮盤", v3); add("明蝦", v3); add("吐司", v3); add("竹籤", v3 * 4); add("烤肉醬/胡椒粉", v3); add("大黑盤/大真空袋", v3); }
    if(v4 > 0) { add("豬嫩肩500g", v4); add("美國板腱400g", v4); add("松阪豬300g", v4); add("牛肋條250g", v4); add("普羅旺斯雞腿500g", v4); add("海鮮盤", v4); add("明蝦", v4); add("吐司", v4); add("竹籤", v4 * 4); add("烤肉醬/胡椒粉", v4); add("大黑盤/大真空袋", v4); }
    
    showResult('res2', 'list2', s, order);
}

// 其餘函數維持原樣...
function calculateMA() {
    const v1 = parseInt(document.getElementById('mA_1').value) || 0;
    const v2 = parseInt(document.getElementById('mA_2').value) || 0;
    const v3 = parseInt(document.getElementById('mA_3').value) || 0;
    const v4 = parseInt(document.getElementById('mA_4').value) || 0;
    const s = {};
    const add = (n, q) => s[n] = (s[n] || 0) + q;
    const order = ["牛五花150g+豬嫩肩150g", "牛五花500g", "豬梅花500g", "無骨牛500g", "板腱500g", "沙朗牛排100g", "沙朗牛排300g", "牛舌150g", "海鮮盤(小花枝*4、花枝丸*4、扇貝*4、香腸*2)", "10p草蝦", "5p干貝", "10p干貝", "5p香腸", "10p香腸", "二節翅", "魷魚", "鯖魚"];
    if(v1 > 0) { add("牛五花150g+豬嫩肩150g", v1); add("海鮮盤(小花枝*4、花枝丸*4、扇貝*4、香腸*2)", v1); add("二節翅", v1 * 2); add("魷魚", v1); }
    if(v2 > 0) { add("牛五花500g", v2); add("豬梅花500g", v2); add("沙朗牛排100g", v2); add("10p草蝦", v2); add("5p香腸", v2); add("5p干貝", v2); add("鯖魚", v2); }
    if(v3 > 0) { add("牛五花500g", v3); add("豬梅花500g", v3); add("沙朗牛排300g", v3); add("牛舌150g", v3); add("10p草蝦", v3); add("5p香腸", v3); add("5p干貝", v3); add("鯖魚", v3); }
    if(v4 > 0) { add("牛五花500g", v4); add("豬梅花500g", v4); add("無骨牛500g", v4); add("板腱500g", v4); add("沙朗牛排300g", v4); add("牛舌150g", v4); add("10p草蝦", v4); add("10p香腸", v4); add("10p干貝", v4); add("鯖魚", v4 * 2); }
    showResult('resA', 'listA', s, order);
}

function calculateMB() {
    const v1 = parseInt(document.getElementById('mB_1').value) || 0;
    const v2 = parseInt(document.getElementById('mB_2').value) || 0;
    const v3 = parseInt(document.getElementById('mB_3').value) || 0;
    const v4 = parseInt(document.getElementById('mB_4').value) || 0;
    const s = {};
    const add = (n, q) => s[n] = (s[n] || 0) + q;
    const order = ["牛五花300g", "板腱300g", "翼板300g", "豬嫩肩300g", "火鍋料", "刻花魷魚300g", "鱸魚片250g", "花枝漿", "10p干貝"];
    if(v1 > 0) { add("牛五花300g", v1); add("豬嫩肩300g", v1); add("火鍋料", v1); add("刻花魷魚300g", v1); add("鱸魚片250g", v1); }
    if(v2 > 0) { add("板腱300g", v2); add("豬嫩肩300g", v2 * 2); add("火鍋料", v2); add("刻花魷魚300g", v2); add("鱸魚片250g", v2); add("花枝漿", v2); }
    if(v3 > 0) { add("翼板300g", v3 * 2); add("豬嫩肩300g", v3 * 2); add("火鍋料", v3); add("刻花魷魚300g", v3 * 2); add("鱸魚片250g", v3); add("花枝漿", v3); }
    if(v4 > 0) { add("翼板300g", v4 * 2); add("豬嫩肩300g", v4 * 3); add("火鍋料", v4 * 2); add("刻花魷魚300g", v4 * 2); add("鱸魚片250g", v4 * 2); add("花枝漿", v4 * 2); add("10p干貝", v4); }
    showResult('resB', 'listB', s, order);
}

function calculateMC() {
    const v1 = parseInt(document.getElementById('mC_1').value) || 0;
    const s = {"節慶活動組 01": v1};
    showResult('resC', 'listC', s, ["節慶活動組 01"]);
}
</script>
</body>
</html>
